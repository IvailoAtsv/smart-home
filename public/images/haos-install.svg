<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="HAOS install">
  <rect width="360" height="360" fill="#FFF8EC"/>

  <rect x="130" y="24" width="100" height="40" rx="10" fill="#0D9488"/>
  <text x="180" y="50" text-anchor="middle" fill="#ECFDF5" font-family="system-ui,sans-serif" font-size="13" font-weight="700">USB</text>

  <rect x="178" y="64" width="4" height="24" fill="#A8A29E"/>

  <rect x="80" y="88" width="200" height="88" rx="14" fill="#1C1917"/>
  <text x="180" y="128" text-anchor="middle" fill="#FFF8EC" font-family="system-ui,sans-serif" font-size="15" font-weight="700">HAOS</text>
  <text x="180" y="150" text-anchor="middle" fill="#A8A29E" font-family="system-ui,sans-serif" font-size="12">on SSD</text>

  <rect x="178" y="176" width="4" height="24" fill="#0D9488"/>

  <rect x="48" y="200" width="264" height="72" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="180" y="232" text-anchor="middle" fill="#92400E" font-family="system-ui,sans-serif" font-size="15" font-weight="700">:8123</text>
  <text x="180" y="254" text-anchor="middle" fill="#B45309" font-family="system-ui,sans-serif" font-size="12">homeassistant.local</text>

  <text x="180" y="310" text-anchor="middle" fill="#57534E" font-family="system-ui,sans-serif" font-size="12">Erases the selected disk</text>
  <text x="180" y="330" text-anchor="middle" fill="#57534E" font-family="system-ui,sans-serif" font-size="12">check twice</text>
